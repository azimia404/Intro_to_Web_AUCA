<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2: Modal Image Preview</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: #bbb;
        }
    </style>
</head>
<body>
    <h1>Image Gallery with Modal</h1>
    <div class="gallery">
        <img src="https://picsum.photos/id/1015/300/300" alt="Mountain landscape" onclick="openModal(this)">
        <img src="https://picsum.photos/id/1018/300/300" alt="Valley view" onclick="openModal(this)">
        <img src="https://picsum.photos/id/1043/300/300" alt="River" onclick="openModal(this)">
        <img src="https://picsum.photos/id/1/300/300" alt="Computer desk" onclick="openModal(this)">
        <img src="https://picsum.photos/id/100/300/300" alt="Camera" onclick="openModal(this)">
        <img src="https://picsum.photos/id/101/300/300" alt="Cityscape" onclick="openModal(this)">
    </div>

    <div id="myModal" class="modal" onclick="closeModal(event)">
        <span class="close" onclick="closeModal(event)">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        let modal = document.getElementById("myModal");
        let modalImg = document.getElementById("modalImage");

        function openModal(img) {
            modal.style.display = "block";
            modalImg.src = img.src;
        }

        function closeModal(event) {
            if (event.target === modal || event.target.className === "close") {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
