<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2: Display Posts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .posts-container {
            display: grid;
            gap: 20px;
        }
        .post-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .post-title {
            color: #007bff;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .post-body {
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>Latest Posts</h1>
    <div class="posts-container" id="postsContainer"></div>

    <script>
        fetch('https://jsonplaceholder.typicode.com/posts')
            .then(response => response.json())
            .then(posts => {
                let container = document.getElementById('postsContainer');
                let firstFivePosts = posts.slice(0, 5);
                
                firstFivePosts.forEach(post => {
                    let card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="post-title">${post.title}</div>
                        <div class="post-body">${post.body}</div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('postsContainer').innerHTML = '<div class="post-card">Error loading posts</div>';
            });
    </script>
</body>
</html>
