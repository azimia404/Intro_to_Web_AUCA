<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab 5: Prevent Default Example</title>
    <style>
        form {
            margin-bottom: 10px;
        }
        input, button {
            padding: 5px 10px;
            margin: 5px 0;
        }
        #error {
            color: #d32f2f;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <form id="myForm">
        <input type="text" placeholder="Enter text" required>
        <br>
        <button type="submit">Submit</button>
    </form>
    <p id="error"></p>

    <script>
        document.getElementById("myForm").addEventListener("submit", function(event) {
            event.preventDefault(); 
            document.getElementById("error").innerText = "Form submission prevented!";
        });
    </script>
</body>
</html>
